name: 🚀 Deploy - CARNICERIA VA

on:
  push:
    branches: [ master ]
    paths-ignore:
      - 'docs/**'
      - '*.md'
  workflow_dispatch:
    inputs:
      deploy_frontend:
        description: 'Deploy Frontend'
        required: false
        default: true
        type: boolean
      deploy_backend:
        description: 'Deploy Backend'
        required: false
        default: true
        type: boolean

jobs:
  deploy_backend:
    name: Deploy Backend - CARNICERIA VA
    runs-on: ubuntu-latest
    environment: carniceriava
    if: ${{ github.event.inputs.deploy_backend != 'false' || github.event_name == 'push' }}
    
    steps:
    - name: Deploy Backend to VPS
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.CLIENT_CARNICERIAVA_VPS_HOST || secrets.VPS_HOST }}
        port: ${{ secrets.CLIENT_CARNICERIAVA_VPS_PORT || secrets.VPS_PORT }}
        username: root
        key: ${{ secrets.CLIENT_CARNICERIAVA_VPS_SSH_KEY || secrets.VPS_SSH_KEY }}
        timeout: 120s
        command_timeout: 20m
        script_stop: true
        script: |
          cd ${{ secrets.CLIENT_CARNICERIAVA_BACKEND_DEPLOY_PATH || secrets.BACKEND_DEPLOY_PATH }}
          echo "🚀 Deploying backend to CARNICERIA VA..."
          git fetch origin
          git reset --hard origin/master
          cd apps/backend
          
          # Detectar usuario del sitio (CyberCP asigna usuario único por sitio)
          DEPLOY_PATH="${{ secrets.CLIENT_CARNICERIAVA_BACKEND_DEPLOY_PATH || secrets.BACKEND_DEPLOY_PATH }}"
          PUBLIC_HTML=$(echo "$DEPLOY_PATH" | sed 's|/apps/backend.*||')
          if [ -d "$PUBLIC_HTML" ]; then
            SITE_USER=$(stat -c '%U' "$PUBLIC_HTML" 2>/dev/null)
            SITE_GROUP=$(stat -c '%G' "$PUBLIC_HTML" 2>/dev/null)
          fi
          
          # Fallback a www-data si no se detecta usuario
          WEB_USER="${SITE_USER:-www-data}"
          WEB_GROUP="${SITE_GROUP:-$WEB_USER}"
          echo "✅ Usuario del sitio: $WEB_USER:$WEB_GROUP"
          
          # Asegurar permisos de storage y cache
          mkdir -p storage/framework/views
          mkdir -p storage/framework/cache/data
          mkdir -p storage/framework/sessions
          mkdir -p storage/logs
          mkdir -p bootstrap/cache
          mkdir -p storage/app/public/system/logos
          mkdir -p storage/app/public/system/favicons
          mkdir -p public/images
          
          chown -R $WEB_USER:$WEB_GROUP storage bootstrap/cache public/images 2>/dev/null || sudo chown -R $WEB_USER:$WEB_GROUP storage bootstrap/cache public/images || true
          find storage -type d -exec chmod 775 {} \; 2>/dev/null || true
          find storage -type f -exec chmod 664 {} \; 2>/dev/null || true
          chmod -R 775 bootstrap/cache 2>/dev/null || true
          chmod -R 755 public/images 2>/dev/null || true
          
          composer install --no-dev --optimize-autoloader
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache
          php artisan migrate --force
          
          # Crear symlink para /images/ (LiteSpeed compatibility)
          cd ../../..
          if [ ! -L "images" ] && [ ! -d "images" ]; then
            ln -s apps/backend/public/images images
            echo "✅ Symlink /images/ creado"
          fi
          
          echo "✅ Backend deployment completed"
          
    - name: Notify backend deployment (success)
      if: success()
      run: |
        echo "✅ Backend deployment completed for CARNICERIA VA"

    - name: Notify backend deployment (failure)
      if: failure()
      run: |
        echo "❌ Backend deployment FAILED for CARNICERIA VA"

  deploy_frontend:
    name: Deploy Frontend - CARNICERIA VA
    runs-on: ubuntu-latest
    environment: carniceriava
    if: ${{ github.event.inputs.deploy_frontend != 'false' || github.event_name == 'push' }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: 'apps/frontend/package.json'
        
    - name: Install dependencies
      run: |
        cd apps/frontend
        npm ci || npm install --force
        npm install @rollup/rollup-linux-x64-gnu --save-optional || true
        npm install @swc/core-linux-x64-gnu --save-optional || true
        npm install lightningcss-linux-x64-gnu --save-optional || true
        npm install @tailwindcss/oxide-linux-x64-gnu --save-optional || true
        
    - name: Build frontend
      run: |
        cd apps/frontend
        npm run build
      env:
        VITE_API_URL: ${{ secrets.CLIENT_CARNICERIAVA_API_URL || secrets.VITE_API_URL }}
        VITE_FEATURES: ${{ secrets.CLIENT_CARNICERIAVA_FEATURES_JSON }}
        
    - name: Deploy Frontend to VPS
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.CLIENT_CARNICERIAVA_VPS_HOST || secrets.VPS_HOST }}
        port: ${{ secrets.CLIENT_CARNICERIAVA_VPS_PORT || secrets.VPS_PORT }}
        username: root
        key: ${{ secrets.CLIENT_CARNICERIAVA_VPS_SSH_KEY || secrets.VPS_SSH_KEY }}
        source: "apps/frontend/dist/*"
        target: ${{ secrets.CLIENT_CARNICERIAVA_FRONTEND_DEPLOY_PATH || secrets.FRONTEND_DEPLOY_PATH }}
        strip_components: 2
        rm: true
        timeout: 120s
        command_timeout: 20m
        
    - name: Verify and fix frontend deployment
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.CLIENT_CARNICERIAVA_VPS_HOST || secrets.VPS_HOST }}
        port: ${{ secrets.CLIENT_CARNICERIAVA_VPS_PORT || secrets.VPS_PORT }}
        username: root
        key: ${{ secrets.CLIENT_CARNICERIAVA_VPS_SSH_KEY || secrets.VPS_SSH_KEY }}
        timeout: 120s
        command_timeout: 20m
        script_stop: true
        script: |
          DEPLOY_PATH="${{ secrets.CLIENT_CARNICERIAVA_FRONTEND_DEPLOY_PATH || secrets.FRONTEND_DEPLOY_PATH }}"
          echo "🔍 Verificando deployment en: $DEPLOY_PATH"
          
          if [ -d "$DEPLOY_PATH/dist" ] && [ -f "$DEPLOY_PATH/dist/index.html" ]; then
            echo "⚠️  Archivos encontrados en subdirectorio dist/, moviendo a raíz..."
            shopt -s dotglob
            mv "$DEPLOY_PATH/dist"/* "$DEPLOY_PATH/" 2>/dev/null || sudo mv "$DEPLOY_PATH/dist"/* "$DEPLOY_PATH/" || true
            shopt -u dotglob
            rmdir "$DEPLOY_PATH/dist" 2>/dev/null || sudo rmdir "$DEPLOY_PATH/dist" || true
          fi
          
          # Detectar usuario
          WEB_USER="www-data"
          if id nginx >/dev/null 2>&1; then WEB_USER="nginx"; elif id apache >/dev/null 2>&1; then WEB_USER="apache"; fi
          if [ -d "/home" ]; then
            SITE_DIR=$(dirname "$DEPLOY_PATH" 2>/dev/null)
            if [ -n "$SITE_DIR" ]; then
              SITE_USER=$(stat -c '%U' "$SITE_DIR" 2>/dev/null)
              if [ -n "$SITE_USER" ] && [ "$SITE_USER" != "root" ]; then WEB_USER="$SITE_USER"; fi
            fi
          fi
          
          chmod -R 755 "$DEPLOY_PATH" 2>/dev/null || sudo chmod -R 755 "$DEPLOY_PATH" || true
          find "$DEPLOY_PATH" -type f -exec chmod 644 {} \; 2>/dev/null || sudo find "$DEPLOY_PATH" -type f -exec chmod 644 {} \; || true
          chown -R $WEB_USER:$WEB_USER "$DEPLOY_PATH" 2>/dev/null || sudo chown -R $WEB_USER:$WEB_USER "$DEPLOY_PATH" || true
          
          echo "✅ index.html existe: $([ -f "$DEPLOY_PATH/index.html" ] && echo 'SÍ' || echo 'NO')"
          
    - name: Notify frontend deployment (success)
      if: success()
      run: |
        echo "✅ Frontend deployment completed for CARNICERIA VA"

    - name: Notify frontend deployment (failure)
      if: failure()
      run: |
        echo "❌ Frontend deployment FAILED for CARNICERIA VA"
